# morph-KGC configuration for free-exercise-graph
# Run from project root via: python3 pipeline/map.py
# See ADR-038 for architecture rationale.
#
# Single section with no file_path — morph-KGC resolves each triples map's
# data source from its YARRRML access value (rml:source literal), not from
# a config override. This is required when one mapping file references
# multiple data source files (JSON + CSV crosswalks) across triples maps.

[CONFIGURATION]
output_format = N-TRIPLES
number_of_processes = 1
logging_level = WARNING

[AllMappings]
mappings = sources/free-exercise-db/mappings/exercises.yarrrml.yaml
