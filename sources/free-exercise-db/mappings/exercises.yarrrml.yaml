# YARRRML mapping: free-exercise-db raw JSON → RDF
# All triples maps in one file — required for cross-TM join references.
# Executed by morph-KGC via pipeline/map.py (single [AllMappings] section).
#
# Source files (resolved from project root):
#   sources/free-exercise-db/raw/exercises_normalized.json  — preprocessed by map.py
#   sources/free-exercise-db/mappings/muscle_crosswalk.csv  — source string → feg:Muscle URI
#   sources/free-exercise-db/mappings/equipment_crosswalk.csv — source string → feg:Equipment URI
#
# URI conventions (ADR-040):
#   Exercise:          feg:ex_{id}
#   MuscleInvolvement: feg:inv_ex_{id}_{feg_local_name}_{degree}
#   map.py normalises primaryMuscles/secondaryMuscles values to feg_local_name
#   before morph-KGC runs, so no percent-encoded spaces appear in URIs.

prefixes:
  feg: https://placeholder.url#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#

mappings:

  # ── Vocabulary concept anchors ─────────────────────────────────────────────
  # These maps read the crosswalk CSVs and provide stable IRI subjects for
  # the join conditions in ExerciseMap, PrimaryInvolvementMap, and
  # SecondaryInvolvementMap. The rdf:type triples make ingested.ttl
  # partially self-contained; they duplicate type assertions from muscles.ttl
  # and equipment.ttl but are harmless and useful for standalone querying.

  MuscleConceptMap:
    sources:
      - [sources/free-exercise-db/mappings/muscle_crosswalk.csv~csv]
    subjects: https://placeholder.url#$(feg_local_name)
    predicateobjects:
      - [rdf:type, feg:Muscle~iri]

  EquipmentConceptMap:
    sources:
      - [sources/free-exercise-db/mappings/equipment_crosswalk.csv~csv]
    subjects: https://placeholder.url#$(feg_local_name)
    predicateobjects:
      - [rdf:type, feg:Equipment~iri]

  # ── Exercise nodes ─────────────────────────────────────────────────────────
  # Reads from exercises_normalized.json (generated by map.py).
  # primaryMuscles/secondaryMuscles values are already feg_local_name strings.

  ExerciseMap:
    sources:
      - [sources/free-exercise-db/raw/exercises_normalized.json~jsonpath, "$[*]"]
    subjects: https://placeholder.url#ex_$(id)
    predicateobjects:
      - [rdf:type, feg:Exercise~iri]
      - [feg:legacySourceId, $(id), xsd:string]
      - [rdfs:label, $(name)]
      - predicate: feg:equipment
        objects:
          - mappings: EquipmentConceptMap
            condition:
              function: equal
              parameters:
                - [str1, $(equipment)]
                - [str2, $(source_string)]
      - predicate: feg:hasInvolvement
        objects:
          - mappings: PrimaryInvolvementMap
            condition:
              function: equal
              parameters:
                - [str1, $(id)]
                - [str2, $(id)]
      - predicate: feg:hasInvolvement
        objects:
          - mappings: SecondaryInvolvementMap
            condition:
              function: equal
              parameters:
                - [str1, $(id)]
                - [str2, $(id)]

  # ── MuscleInvolvement nodes ────────────────────────────────────────────────
  # morph-KGC auto-explodes primaryMuscles / secondaryMuscles arrays when
  # both id and the array field are referenced from the same $[*] iterator.
  # Exercises with empty secondary muscle arrays produce no Synergist triples.
  # After normalisation, $(primaryMuscles) / $(secondaryMuscles) = feg_local_name,
  # so URIs contain clean camelCase names (no percent-encoding).

  PrimaryInvolvementMap:
    sources:
      - [sources/free-exercise-db/raw/exercises_normalized.json~jsonpath, "$[*]"]
    subjects: https://placeholder.url#inv_ex_$(id)_$(primaryMuscles)_PrimeMover
    predicateobjects:
      - [rdf:type, feg:MuscleInvolvement~iri]
      - [feg:degree, feg:PrimeMover~iri]
      - predicate: feg:muscle
        objects:
          - mappings: MuscleConceptMap
            condition:
              function: equal
              parameters:
                - [str1, $(primaryMuscles)]
                - [str2, $(feg_local_name)]

  SecondaryInvolvementMap:
    sources:
      - [sources/free-exercise-db/raw/exercises_normalized.json~jsonpath, "$[*]"]
    subjects: https://placeholder.url#inv_ex_$(id)_$(secondaryMuscles)_Synergist
    predicateobjects:
      - [rdf:type, feg:MuscleInvolvement~iri]
      - [feg:degree, feg:Synergist~iri]
      - predicate: feg:muscle
        objects:
          - mappings: MuscleConceptMap
            condition:
              function: equal
              parameters:
                - [str1, $(secondaryMuscles)]
                - [str2, $(feg_local_name)]
