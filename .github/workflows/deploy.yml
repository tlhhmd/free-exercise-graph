name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Verify committed site artifacts
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          site_dir = Path("app")
          data_path = site_dir / "data.json"
          vocab_path = site_dir / "vocab.json"
          index_path = site_dir / "index.html"

          for path in (index_path, data_path, vocab_path):
              assert path.exists(), f"Missing deploy artifact: {path}"

          data = json.loads(data_path.read_text())
          vocab = json.loads(vocab_path.read_text())

          assert isinstance(data, list), "app/data.json must be a JSON array"
          assert len(data) > 0, "app/data.json is empty"
          assert isinstance(vocab, dict), "app/vocab.json must be a JSON object"
          print(f"app/data.json exercises: {len(data)}")
          print(f"app/vocab.json keys: {sorted(vocab.keys())}")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
